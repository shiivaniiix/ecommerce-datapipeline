<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Amazon-style Navbar -->
    <nav class="navbar-amazon">
        <div class="navbar-top">
            <div class="navbar-container">
                <!-- Logo -->
                <a href="/" class="navbar-logo">E-Shop</a>
                
                <!-- Search Bar -->
                <div class="navbar-search">
                    <input type="text" placeholder="Search products..." class="form-control">
                    <button type="button"><i class="fas fa-search"></i></button>
                </div>
                
                <!-- Navigation Links -->
                <div class="navbar-links">
                    <a href="/">Home</a>
                    <a href="/cart" class="navbar-cart">
                        <span class="navbar-cart-icon"><i class="fas fa-shopping-cart"></i></span>
                        <span>Cart</span>
                    </a>
                    {% if session.user %}
                    <a href="/logout">Logout</a>
                    {% else %}
                    <a href="/login">Login</a>
                    <a href="/signup">Signup</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-container">
        <h1 class="auth-title">Sign in</h1>
        
        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn-primary">Sign in</button>
        </form>
        
        <div class="auth-link">
            New to E-Shop? <a href="/signup">Create an account</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
