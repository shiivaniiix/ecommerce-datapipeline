<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Amazon-style Navbar -->
    <nav class="navbar-amazon">
        <div class="navbar-top">
            <div class="navbar-container">
                <!-- Logo -->
                <a href="/" class="navbar-logo">E-Shop</a>
                
                <!-- Search Bar -->
                <div class="navbar-search">
                    <input type="text" placeholder="Search products..." class="form-control">
                    <button type="button"><i class="fas fa-search"></i></button>
                </div>
                
                <!-- Navigation Links -->
                <div class="navbar-links">
                    <a href="/">Home</a>
                    <a href="/cart" class="navbar-cart">
                        <span class="navbar-cart-icon"><i class="fas fa-shopping-cart"></i></span>
                        <span>Cart</span>
                    </a>
                    {% if session.user %}
                    <a href="/logout">Logout</a>
                    {% else %}
                    <a href="/login">Login</a>
                    <a href="/signup">Signup</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <h1 class="page-title">Shop Products</h1>
        
        <div class="products-grid">
            {% for product in products %}
            <div class="product-card">
                <div class="product-image">
                    {{ product.name[0] }}
                </div>
                <div class="product-info">
                    <h3 class="product-name">{{ product.name }}</h3>
                    
                    <div class="product-rating">
                        <span class="stars">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star-half-alt"></i>
                        </span>
                        <a href="#" class="rating-text">({{ (4.5 + loop.index0 * 0.3) | round(1) }})</a>
                    </div>
                    
                    <div class="product-price">{{ product.price }}</div>
                    
                    <a href="/add_to_cart/{{ product.id }}" class="btn-add-cart">Add to Cart</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
